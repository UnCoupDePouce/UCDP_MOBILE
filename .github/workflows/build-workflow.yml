name: Workflow UCPD
on:
  push:
    branches: 
      - '26000.*'
jobs:

  push-to-org:
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      - name: Add org remote
        run: |
          git remote add org https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/UnCoupDePouce/UCDP_MOBILE.git
   
      - name: Checkout 26000.0
        run: git checkout 26000.0
      
      - name: Push to org main
        run: git push org 26000.0:main --force


  quality:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4

     - name: Setup Node
       uses: actions/setup-node@v4
       with:
         node-version: 24

     - name: Clean npm cache
       run: npm cache clean --force

     - name: Install dependencies
       run: npm install

     - name: ESLint
       run: npx eslint "src/**/*.{ts,tsx,js,jsx}"
       continue-on-error: true

     - name: Prettier
       run: npx prettier --write "src/**/*.{ts,tsx,js,jsx,json,css,md}"
       continue-on-error: true

     - name: TypeScript Check
       run: npx tsc --noEmit


  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Sync to Capacitor
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
         distribution: 'temurin'
         java-version: '21'

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android bundle
        run: cd android && ./gradlew assembleDebug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v1-release
          path: android/app/build/outputs/apk/debug/app-debug.apk   